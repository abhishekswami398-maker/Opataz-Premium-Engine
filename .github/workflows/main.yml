name: Build Opataz APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libltdl-dev
        pip install --upgrade pip
        pip install buildozer cython

    - name: Build APK with Buildozer
      run: buildozer android debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v3
      with:
        name: Opataz-AI-Premium-APK
        path: bin/*.apk
        
