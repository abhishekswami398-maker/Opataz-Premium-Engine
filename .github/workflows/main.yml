name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git python3-dev libffi-dev libssl-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good openjdk-17-jdk unzip autoconf automake libtool pkg-config

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer virtualenv

    - name: Auto-Generate Clean Buildozer Spec
      run: |
        rm -f buildozer.spec
        cat <<EOT >> buildozer.spec
        [app]
        title = Opataz AI
        package.name = opatazai
        package.domain = org.opataz
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 1.0.0
        requirements = python3,kivy==2.3.0,kivymd==1.2.0,pillow
        orientation = portrait
        fullscreen = 1
        android.permissions = READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE, INTERNET
        android.api = 33
        android.minapi = 24
        android.ndk = 25b
        android.accept_sdk_license = True
        android.private_storage = True
        android.archs = armeabi-v7a, arm64-v8a
        android.allow_backup = True
        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOT

    - name: Build with Buildozer
      run: |
        rm -rf ~/.buildozer
        rm -rf .buildozer/
        YES=1 buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Opataz-AI-APK
        path: bin/*.apk
        
