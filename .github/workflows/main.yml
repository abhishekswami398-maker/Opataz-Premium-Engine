name: Ultimate Bulletproof Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System and Buildozer Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential ccache git libffi-dev libssl-dev \
          autoconf automake libtool pkg-config zlib1g-dev \
          cmake unbound zip unzip openjdk-17-jdk \
          libltdl-dev libgmp-dev libmpfr-dev libmpc-dev

    - name: Install Buildozer, Cython and Tools
      run: |
        pip install --upgrade pip setuptools wheel
        pip install "cython<3.0.0" buildozer virtualenv

    - name: Build Android APK
      run: |
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Opataz-AI-App
        path: bin/*.apk
        
