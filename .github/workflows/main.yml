name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    # सबसे स्थिर और बिना किसी पैकेज टकराव वाला पुराना सर्वर एनवायरनमेंट
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Pure Core Dependencies
      run: |
        sudo apt-get update
        # यहाँ से सभी विवादास्पद gstreamer पैकेजेस को पूरी तरह हटा दिया गया है
        sudo apt-get install -y build-essential ccache git python3-dev libffi-dev libssl-dev unzip autoconf automake libtool pkg-config cmake

    - name: Install Buildozer and Fixed Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer virtualenv

    - name: Auto-Generate Clean Buildozer Spec
      run: |
        rm -f buildozer.spec
        cat <<EOT >> buildozer.spec
        [app]
        title = Opataz AI
        package.name = opatazai
        package.domain = org.opataz
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 1.0.0
        requirements = python3,kivy,kivymd,pillow
        orientation = portrait
        fullscreen = 1
        android.permissions = READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE, INTERNET
        android.api = 33
        android.minapi = 24
        android.ndk = 25b
        android.accept_sdk_license = True
        android.private_storage = True
        android.archs = armeabi-v7a, arm64-v8a
        android.allow_backup = True
        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOT

    - name: Clean Cache and Build Android APK
      run: |
        rm -rf ~/.buildozer
        rm -rf .buildozer/
        export JAVA_HOME=$JAVA_HOME_17_X64
        export PATH=$JAVA_HOME/bin:$PATH
        YES=1 buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Opataz-AI-APK
        path: bin/*.apk
        
