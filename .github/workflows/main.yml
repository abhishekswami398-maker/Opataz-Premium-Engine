name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # यहाँ हम अपनी मर्ज़ी का बिल्कुल स्टेबल पाइथन वर्शन सेट कर रहे हैं
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y libsqlite3-dev gapc libffi-dev libssl-dev
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer

    - name: Build with Buildozer
      run: |
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
        
