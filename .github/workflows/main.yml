name: Build Opataz APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev openjdk-17-jdk zip unzip autoconf libtool pkg-config libncurses5-dev libssl-dev cmake libffi-dev libltdl-dev

    - name: Install Python Tools
      run: |
        pip install --upgrade pip virtualenv
        pip install "cython<3.0.0" buildozer

    - name: Build APK with Buildozer
      run: |
        export BUILDOZER_WARN_ON_ROOT=1
        buildozer android debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Opataz-AI-Premium-APK
        path: bin/*.apk
        
