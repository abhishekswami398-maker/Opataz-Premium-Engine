name: Ultimate Bulletproof Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Upgrade Git and Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:git-core/ppa
        sudo apt-get update
        sudo apt-get install -y git build-essential ccache libffi-dev libssl-dev \
          autoconf automake libtool pkg-config zlib1g-dev \
          cmake unbound zip unzip openjdk-17-jdk

    - name: Install Buildozer and Fixed Cython
      run: |
        pip install --upgrade pip setuptools wheel
        pip install "cython<3.0.0" buildozer virtualenv

    - name: Build Android APK
      run: |
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Opataz-AI-App
        path: bin/*.apk
        
