name: Ultimate Bulletproof Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential ccache git libffi-dev libssl-dev \
          autoconf automake libtool pkg-config zlib1g-dev \
          cmake unbound zip unzip openjdk-17-jdk

    - name: Install Setup Tools and Fixed Cython
      run: |
        pip install --upgrade pip
        pip install "setuptools<60.0.0" "cython<3.0.0" buildozer virtualenv

    - name: Build Android APK
      run: |
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Opataz_AI_App
        path: bin/*.apk
        
