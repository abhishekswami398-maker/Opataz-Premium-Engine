name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git python3-dev libffi-dev libssl-dev unzip autoconf automake libtool pkg-config cmake

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer virtualenv

    - name: Auto-Generate Clean Buildozer Spec
      run: |
        rm -f buildozer.spec
        buildozer init
        
        # सीधे spec फ़ाइल को सबसे सटीक सेटिंग्स के साथ ओवरराइट करना
        cat <<EOT > buildozer.spec
        [app]
        title = Opataz AI
        package.name = opatazai
        package.domain = org.opataz
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,json,csv
        version = 1.0.0
        requirements = python3,kivy==2.3.0,kivymd==1.2.0,pillow
        orientation = portrait
        fullscreen = 1
        android.permissions = READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE, INTERNET
        android.api = 33
        android.minapi = 24
        android.ndk = 25b
        android.accept_sdk_license = True
        android.private_storage = True
        android.archs = armeabi-v7a, arm64-v8a
        android.allow_backup = True
        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOT

    - name: Clean Environment Paths
      run: |
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        rm -rf ~/.buildozer
        rm -rf .buildozer/

    - name: Ultimate Bulletproof Build
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        export PATH=$JAVA_HOME/bin:$PATH
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        # टूलचेन को पूरा सच उगलने पर मजबूर करने के लिए DEBUG फ़्लैग के साथ रन करना
        text="yes"
        echo "$text" | buildozer -v android debug || { echo "---------------- BUILD FAILED! PRINTING DETAILED LOGS ----------------"; cat .buildozer/android/platform/build-armeabi-v7a_arm64-v8a/dists/opatazai__armeabi-v7a/build.log 2>/dev/null || true; exit 1; }

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Opataz-AI-APK
        path: bin/*.apk
        
